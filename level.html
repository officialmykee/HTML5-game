<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Season Two - Level Select</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0da0d8;
  }

  #stage {
    position: fixed;
    top: 0; left: 0;
    background: radial-gradient(ellipse at 50% 30%, #72e8f8 0%, #29c6ee 35%, #0da0d8 65%, #0882b8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
  }

  /* Panel */
  .panel {
    position: relative;
    background: linear-gradient(170deg, #ffe066 0%, #ffd000 60%, #ffb800 100%);
    border-radius: 32px;
    padding: 18px 28px 22px;
    width: min(780px, 94vw);
    max-height: 96vh;
    box-shadow:
      0 0 0 5px #ff9a00,
      0 0 0 9px #fff3,
      0 8px 40px #0007,
      inset 0 3px 0 #fff9,
      inset 0 -4px 0 #c87800;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    animation: panelSlide 0.5s cubic-bezier(.3,1.4,.6,1) both;
  }

  @keyframes panelSlide {
    from { transform: translateY(80px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* Header row */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    justify-content: center;
  }

  .nav-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: radial-gradient(circle at 38% 35%, #7dff5c, #3bc41a 55%, #259010);
    box-shadow:
      0 0 0 3px #1a7a08,
      0 4px 0 #1a7a08,
      inset 0 3px 5px #b6ffa0;
    transition: transform 0.1s, box-shadow 0.1s;
    color: white;
    text-shadow: 0 2px 3px #0008;
  }
  .nav-btn:hover { filter: brightness(1.1); }
  .nav-btn:active {
    transform: translateY(3px);
    box-shadow: 0 0 0 3px #1a7a08, 0 1px 0 #1a7a08, inset 0 3px 5px #b6ffa0;
  }
  .nav-btn svg { width: 22px; height: 22px; fill: white; }

  .season-title {
    font-size: clamp(26px, 5vw, 38px);
    color: white;
    text-shadow: 0 3px 0 #c87000, 0 5px 12px #0008;
    letter-spacing: 1px;
    flex: 1;
    text-align: center;
  }

  /* Star counter */
  .star-counter {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(18px, 3vw, 24px);
    color: white;
    text-shadow: 0 2px 4px #0006;
  }
  .star-icon { font-size: clamp(22px, 3.5vw, 28px); filter: drop-shadow(0 2px 3px #a07000); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    width: 100%;
  }

  /* Level button */
  .lvl-btn {
    position: relative;
    border: none;
    cursor: pointer;
    border-radius: 20px;
    padding: 0;
    background: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    transition: transform 0.12s;
    animation: bounceIn 0.45s cubic-bezier(.36,1.7,.6,1) both;
  }
  .lvl-btn:hover { transform: scale(1.07); }
  .lvl-btn:active { transform: scale(0.96); }

  .lvl-btn:nth-child(1) { animation-delay: 0.05s; }
  .lvl-btn:nth-child(2) { animation-delay: 0.10s; }
  .lvl-btn:nth-child(3) { animation-delay: 0.15s; }
  .lvl-btn:nth-child(4) { animation-delay: 0.20s; }
  .lvl-btn:nth-child(5) { animation-delay: 0.25s; }
  .lvl-btn:nth-child(6) { animation-delay: 0.30s; }
  .lvl-btn:nth-child(7) { animation-delay: 0.35s; }
  .lvl-btn:nth-child(8) { animation-delay: 0.40s; }

  @keyframes bounceIn {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .lvl-face {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 20px;
    background: linear-gradient(160deg, #ffbe42 0%, #ff8c00 55%, #d96200 100%);
    box-shadow:
      0 0 0 3px #b84e00,
      0 6px 0 #b84e00,
      inset 0 4px 0 #ffe17a,
      inset -3px -3px 0 #c96500;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .lvl-face::before {
    content: '';
    position: absolute;
    top: 10%; left: 12%;
    width: 28%; height: 22%;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    transform: rotate(-20deg);
    filter: blur(2px);
  }
  .lvl-face::after {
    content: '';
    position: absolute;
    bottom: 18%; right: 14%;
    width: 15%; height: 10%;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    filter: blur(1px);
  }

  .lvl-num {
    font-size: clamp(28px, 5vw, 42px);
    color: white;
    text-shadow: 0 3px 0 #a04000, 0 5px 10px #0009;
    line-height: 1;
    z-index: 1;
  }

  /* Locked level */
  .lvl-btn.locked { cursor: not-allowed; }
  .lvl-btn.locked .lvl-face {
    background: linear-gradient(160deg, #b0b0b0 0%, #808080 55%, #606060 100%);
    box-shadow:
      0 0 0 3px #484848,
      0 6px 0 #484848,
      inset 0 4px 0 #d8d8d8,
      inset -3px -3px 0 #686868;
  }
  .lvl-btn.locked:hover { transform: none; }
  .lvl-btn.locked:active { transform: none; }

  .lock-icon {
    font-size: clamp(24px, 4vw, 36px);
    z-index: 1;
    filter: drop-shadow(0 2px 3px #0007);
  }

  .stars-row {
    display: flex;
    gap: 3px;
    margin-top: 5px;
    justify-content: center;
    min-height: clamp(14px, 2.2vw, 18px);
  }

  .star { font-size: clamp(14px, 2.2vw, 18px); filter: drop-shadow(0 1px 2px #0006); }
  .star.filled { color: #ffd700; }
  .star.empty  { color: #8b5e00; filter: drop-shadow(0 1px 2px #0004); opacity: 0.6; }
</style>
</head>
<body>

<div id="stage">
  <div class="panel">
    <div class="header">
      <button class="nav-btn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <span class="season-title">Levels</span>
      <button class="nav-btn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>

    <div class="star-counter">
      <span class="star-icon">⭐</span>
      <span id="star-count">0 / 24</span>
    </div>

    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
  function applyLandscape() {
    const stage = document.getElementById('stage');
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if (vw < vh) {
      stage.style.width  = vh + 'px';
      stage.style.height = vw + 'px';
      stage.style.transformOrigin = 'top left';
      stage.style.transform = 'rotate(90deg) translateY(-' + vw + 'px)';
    } else {
      stage.style.width  = vw + 'px';
      stage.style.height = vh + 'px';
      stage.style.transform = 'none';
      stage.style.transformOrigin = 'top left';
    }
  }

  applyLandscape();
  window.addEventListener('resize', applyLandscape);
  window.addEventListener('orientationchange', () => setTimeout(applyLandscape, 100));

  const TOTAL_LEVELS = 8;
  const MAX_STARS = 3;

  // Load progress from sessionStorage (persists during session)
  let progress = JSON.parse(sessionStorage.getItem('lvl_progress') || 'null') || {
    unlocked: 1,       // how many levels are unlocked
    stars: new Array(TOTAL_LEVELS).fill(0)  // stars earned per level
  };

  function saveProgress() {
    sessionStorage.setItem('lvl_progress', JSON.stringify(progress));
  }

  function totalStars() {
    return progress.stars.reduce((a, b) => a + b, 0);
  }

  function updateCounter() {
    const el = document.getElementById('star-count');
    if (el) el.textContent = totalStars() + ' / ' + (TOTAL_LEVELS * MAX_STARS);
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let i = 0; i < TOTAL_LEVELS; i++) {
      const locked = i >= progress.unlocked;
      const earned = progress.stars[i];

      const btn = document.createElement('button');
      btn.className = 'lvl-btn' + (locked ? ' locked' : '');

      const face = document.createElement('div');
      face.className = 'lvl-face';

      if (locked) {
        const lock = document.createElement('span');
        lock.className = 'lock-icon';
        lock.textContent = '🔒';
        face.appendChild(lock);
      } else {
        const num = document.createElement('span');
        num.className = 'lvl-num';
        num.textContent = i + 1;
        face.appendChild(num);
      }

      const starsRow = document.createElement('div');
      starsRow.className = 'stars-row';

      if (!locked) {
        for (let s = 0; s < MAX_STARS; s++) {
          const star = document.createElement('span');
          star.className = 'star ' + (s < earned ? 'filled' : 'empty');
          star.textContent = '★';
          starsRow.appendChild(star);
        }
      }

      btn.appendChild(face);
      btn.appendChild(starsRow);
      grid.appendChild(btn);

      if (!locked) {
        btn.addEventListener('click', () => {
          face.style.transform = 'scale(0.9)';
          setTimeout(() => { face.style.transform = ''; }, 150);

          // Simulate completing the level with 1–3 random stars
          const newStars = Math.floor(Math.random() * MAX_STARS) + 1;
          if (newStars > progress.stars[i]) {
            progress.stars[i] = newStars;
          }
          // Unlock next level if not already
          if (i + 1 < TOTAL_LEVELS && progress.unlocked <= i + 1) {
            progress.unlocked = i + 2;
          }
          saveProgress();
          setTimeout(() => {
            renderGrid();
            updateCounter();
          }, 200);
        });
      }
    }
  }

  renderGrid();
  updateCounter();
</script>
</body>
</html>
