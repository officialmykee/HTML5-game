<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Loader</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:"Segoe UI",sans-serif; }

/* Splash: fills viewport width, height = 50vw (2:1 image ratio), centred vertically */
#splash {
  position:relative;
  width:100vw;
  height:50vw;
  max-height:100vh;
  overflow:hidden;
  background:#000;
  /* centre vertically in viewport */
  top:50%;
  transform:translateY(-50%);
}

/* Image fills full width, no stretching */
#splashImg {
  position:absolute;
  width:100%;
  height:auto;
  top:50%;
  left:0;
  transform:translateY(-50%);
  display:block;
}

/* Bottom vignette */
#vignette {
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,transparent 45%,rgba(0,0,0,0.45) 72%,rgba(0,0,0,0.82) 100%);
  pointer-events:none;
}

/* Rotate prompt */
#rotatePrompt {
  position:fixed; inset:0;
  background:#07080f;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  z-index:30;
  transition:opacity .45s ease;
}
#rotatePrompt.hidden { opacity:0; pointer-events:none; }
.phone-wrap { animation:tiltPhone 2s ease-in-out infinite; }
@keyframes tiltPhone {
  0%   { transform:rotate(0deg); }
  40%  { transform:rotate(90deg); }
  65%  { transform:rotate(90deg); }
  100% { transform:rotate(0deg); }
}
#rotatePrompt p { color:rgba(180,240,255,.75); font-size:10px; letter-spacing:4px; text-transform:uppercase; }

/* Loader bar */
#loaderWrap {
  position:absolute; bottom:0; left:0; right:0;
  padding:0 4% 3.2%;
  z-index:10; display:none;
}
#loaderWrap.visible { display:block; }
#loaderMeta { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
#loadingLabel { font-size:clamp(7px,1.1vw,11px); letter-spacing:5px; color:rgba(200,245,255,.7); text-shadow:0 0 10px rgba(0,238,255,.55); }
#pctLabel { font-size:clamp(9px,1.4vw,14px); font-weight:700; color:#fff; text-shadow:0 0 14px rgba(0,220,255,.95); }

#barTrack {
  width:100%; height:clamp(4px,.85vw,9px);
  background:rgba(255,255,255,.09); border-radius:99px;
  border:1px solid rgba(255,255,255,.1);
  position:relative; overflow:visible;
}
#barFill {
  height:100%; width:0%; border-radius:99px;
  background:linear-gradient(90deg,#009fcc 0%,#00ddff 45%,#aaf6ff 85%,#fff 100%);
  box-shadow:0 0 8px rgba(0,210,255,.8),0 0 18px rgba(0,210,255,.35);
  position:relative; overflow:hidden;
}
#barFill::after {
  content:""; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.7) 50%,transparent 100%);
  animation:shimmer 1.4s linear infinite;
}
@keyframes shimmer { 0%{left:-60%} 100%{left:110%} }

#barTip {
  position:absolute; top:50%; right:-5px; transform:translateY(-50%);
  width:clamp(7px,1vw,12px); height:clamp(7px,1vw,12px);
  border-radius:50%; background:#fff;
  box-shadow:0 0 6px 3px rgba(0,220,255,1),0 0 14px 6px rgba(0,220,255,.5);
  animation:tipPulse .9s ease-in-out infinite;
}
@keyframes tipPulse {
  0%,100%{box-shadow:0 0 6px 3px rgba(0,220,255,1),0 0 14px 6px rgba(0,220,255,.4)}
  50%    {box-shadow:0 0 10px 5px rgba(0,220,255,1),0 0 22px 10px rgba(0,220,255,.65)}
}
</style>
</head>

  <div class="phone-wrap">
    <svg width="50" height="84" viewBox="0 0 50 84" fill="none">
      <rect x="2" y="2" width="46" height="80" rx="8" stroke="#00eeff" stroke-width="2.5"/>
      <circle cx="25" cy="71" r="5" fill="#00eeff" opacity="0.7"/>
      <rect x="17" y="7" width="16" height="3" rx="1.5" fill="#00eeff" opacity="0.35"/>
    </svg>
  </div>
  <p>Rotate to landscape</p>
</div>
